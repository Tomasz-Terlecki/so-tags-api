services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sotags-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SoTags@Password123"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "SoTags@Password123", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sotags-network

  api:
    build:
      context: .
      dockerfile: ./SoTags/SoTags.API/Dockerfile
    container_name: sotags-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=sotags_db;User Id=sa;Password=SoTags@Password123;TrustServerCertificate=true;"
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - sotags-network

volumes:
  mssql_data:

networks:
  sotags-network:
    driver: bridge
